name: ci

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show tool versions
        shell: pwsh
        run: |
          $PSVersionTable.PSVersion
          winget --version

      - name: Install dsc CLI (pinned)
        shell: pwsh
        run: |
          winget install --id Microsoft.DSC --exact --silent --version 3.1.3 `
            --accept-package-agreements --accept-source-agreements
          dsc --version

      - name: Install PSScriptAnalyzer + Pester
        shell: pwsh
        run: |
          Install-Module Pester              -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer    -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module Microsoft.PowerShell.PSResourceGet -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Verify module is in sync with Classes/*.ps1
        shell: pwsh
        run: ./modules/DscV3.RegFile/build/Sync-Module.ps1 -Verify

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse `
            -Severity Error,Warning -ExcludeRule PSAvoidUsingWriteHost,PSUseShouldProcessForStateChangingFunctions,PSReviewUnusedParameter,TypeNotFound |
            Where-Object { $_.Severity -in 'Error','Warning' }
          if ($issues) { $issues | Format-Table -AutoSize; throw "PSScriptAnalyzer found $($issues.Count) issues." }

      - name: Pester tests
        shell: pwsh
        run: |
          if (Test-Path tests/Pester) {
            Invoke-Pester -Path tests/Pester -Output Detailed -CI
          } else { Write-Host 'No Pester tests yet — skipping.' }

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: lint-and-test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Package platform release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -ItemType Directory _dist -Force | Out-Null
          Compress-Archive -Path modules/DscV3.RegFile `
            -DestinationPath "_dist/DscV3.RegFile-$tag.zip"
          Compress-Archive -Path bootstrap,modules,reporting,schemas,docs,README.md `
            -DestinationPath "_dist/dsc-fleet-$tag.zip"
      - uses: softprops/action-gh-release@v2
        with:
          files: _dist/*.zip
